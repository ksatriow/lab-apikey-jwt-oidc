name: Build Docker Container , Push to ECR Registry & Rollout

on:
  push:
    branches: [ "main", "develop" ]
  # pull_request:
  #   branches: [main]

# -------------------------------------------------------------
# MANAGER RELEASE VERSION
# Change this variable before pushing to trigger a new release!
# -------------------------------------------------------------
env:
  RELEASE_VERSION: "1.2.0" 

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # This is required for requesting the JWT
      contents: read    # This is required for actions/checkout
      
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: apikey
            context: ./apikey
            dockerfile: ./apikey/Dockerfile
          - service: jwt
            context: ./jwt
            dockerfile: ./jwt/Dockerfile
          - service: oidc-app
            context: ./oidc
            dockerfile: ./oidc/Dockerfile.app
          - service: mock-idp
            context: ./oidc
            dockerfile: ./oidc/Dockerfile.idp

    steps:

    - name: Check out code
      uses: actions/checkout@v4
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2
      
    - name: Build and Push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        SERVICE: ${{ matrix.service }}
      run: |
        IMAGE_TAG=${{ env.RELEASE_VERSION }}
        
        # Safety Check
        if [[ -z "$IMAGE_TAG" ]]; then
          echo "⚠️ RELEASE_VERSION is empty in the YAML file! Pipeline aborted."
          exit 1
        fi

        echo "🏷️ Building Release Tag: $IMAGE_TAG"
        
        echo "🚀 Building $SERVICE..."
        docker build -t $ECR_REGISTRY/$SERVICE:$IMAGE_TAG -f ${{ matrix.dockerfile }} ${{ matrix.context }}
        
        echo "📤 Pushing $SERVICE:$IMAGE_TAG to ECR..."
        docker push $ECR_REGISTRY/$SERVICE:$IMAGE_TAG

        echo "🛡️ Triggering ECR Image Scan for $SERVICE:$IMAGE_TAG..."
        aws ecr start-image-scan \
          --repository-name $SERVICE \
          --image-id imageTag=$IMAGE_TAG || echo "⚠️ Scan might already be running."

        echo "🔍 Waiting for ECR Image Scan to complete for $SERVICE:$IMAGE_TAG..."
        aws ecr wait image-scan-complete \
          --repository-name $SERVICE \
          --image-id imageTag=$IMAGE_TAG

        echo "📊 Checking scan findings..."
        SCAN_RESULTS=$(aws ecr describe-image-scan-findings \
          --repository-name $SERVICE \
          --image-id imageTag=$IMAGE_TAG \
          --query 'imageScanFindings.findingSeverityCounts')

        echo "Scan results: $SCAN_RESULTS"

        CRITICAL=$(echo $SCAN_RESULTS | jq -r '.CRITICAL // 0')
        if [ "$CRITICAL" -gt 0 ]; then
          echo "❌ Critical vulnerabilities found in $SERVICE:$IMAGE_TAG!"
          exit 1
        else
          echo "✅ No critical vulnerabilities found in $SERVICE:$IMAGE_TAG."
        fi