name: Reusable ECR Push Template (Multi-Account Ready)

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment context (e.g., dev, production)"

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: apikey
            context: ./apikey
            dockerfile: ./apikey/Dockerfile
            var_name: APIKEY_VERSION
          - service: jwt
            context: ./jwt
            dockerfile: ./jwt/Dockerfile
            var_name: JWT_VERSION
          - service: oidc-app
            context: ./oidc
            dockerfile: ./oidc/Dockerfile.app
            var_name: OIDC_APP_VERSION
          - service: mock-idp
            context: ./oidc
            dockerfile: ./oidc/Dockerfile.idp
            var_name: MOCK_IDP_VERSION

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Resolve Environment Variables
        id: vars
        run: |
          # 1. Image Tag Resolution (Hierarchical: Environment-specific > Global)
          ENV_UPPER=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]' | sed 's/PRODUCTION/PROD/')
          VAR_NAME_ENV="${{ matrix.var_name }}_${ENV_UPPER}"
          
          TAG="${{ vars[VAR_NAME_ENV] || vars[matrix.var_name] }}"
          
          if [[ -z "$TAG" ]]; then
            echo "::error::No version tag found for '${{ matrix.var_name }}' or '$VAR_NAME_ENV' in environment '${{ inputs.environment }}'."
            exit 1
          fi
          
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "🚀 Targeted Environment Account: $ENV_UPPER"
          echo "🏷️ Resolved Image Tag: $TAG"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # IMPORTANT: We use a generic secret name. 
          # GitHub will automatically pick the ARN from the Environment defined in the 'job'.
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'ap-southeast-3' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # This action automatically detects the account ID from the assumed role 
        # and provides the correct registry URL for THAT account.

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to ECR
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          # Registry URL is dynamic: 111111111111.dkr.ecr... for Dev, 222222222222.dkr.ecr... for Prod
          tags: ${{ steps.login-ecr.outputs.registry }}/${{ matrix.service }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
             VERSION=${{ steps.vars.outputs.tag }}
             ENV=${{ inputs.environment }}

      - name: Security Scan (ECR)
        id: scan
        run: |
          echo "::group::Triggering ECR Scan for $SERVICE"
          aws ecr start-image-scan --repository-name ${{ matrix.service }} --image-id imageTag=${{ steps.vars.outputs.tag }} || true
          
          echo "Waiting for scan to complete in targeted AWS Account..."
          aws ecr wait image-scan-complete --repository-name ${{ matrix.service }} --image-id imageTag=${{ steps.vars.outputs.tag }}
          
          SCAN_RESULTS=$(aws ecr describe-image-scan-findings \
            --repository-name ${{ matrix.service }} \
            --image-id imageTag=${{ steps.vars.outputs.tag }} \
            --query 'imageScanFindings.findingSeverityCounts' --output json)
          
          echo "results=$SCAN_RESULTS" >> $GITHUB_OUTPUT
          
          CRITICAL=$(echo "$SCAN_RESULTS" | jq -r '.CRITICAL // 0' 2>/dev/null || echo 0)
          if [[ "$CRITICAL" != "null" && "$CRITICAL" -gt 0 ]]; then
            echo "::error::CRITICAL vulnerabilities found in ${{ matrix.service }} (Image: ${{ steps.vars.outputs.tag }})"
            exit 1
          fi
          echo "::endgroup::"

      - name: Send Deployment Notification
        if: always()
        uses: ksatriow/action-mailer@v1.0.0
        with:
          smtp-server: smtp.gmail.com
          smtp-port: 587
          smtp-secure: false
          from-email: ksatrio@gmail.com
          to-email: kukuhdrive@gmail.com
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[${{ inputs.environment | upper }}] Deployment ${{ job.status }}: ${{ matrix.service }}"
          body: |
            Deployment Status: ${{ job.status }}
            
            Target Account Environment: ${{ inputs.environment }}
            Target Registry: ${{ steps.login-ecr.outputs.registry }}
            Service: ${{ matrix.service }}
            Tag: ${{ steps.vars.outputs.tag }}
            
            Audit Info:
            - Commit: ${{ github.sha }}
            - Actor: ${{ github.actor }}
            - Scan Results: ${{ steps.scan.outputs.results }}
            - Log Link: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}